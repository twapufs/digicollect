name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      server_image: ${{ steps.server_image.outputs.name }}:${{ steps.meta.outputs.version }}
      client_image: ${{ steps.client_image.outputs.name }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase server image name
        id: server_image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}/server' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Lowercase client image name
        id: client_image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}/client' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.server_image.outputs.name }}
            ${{ steps.client_image.outputs.name }}
          tags: |
            type=sha,format=short

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.server_image.outputs.name }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.client_image.outputs.name }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ADMIN_REGISTRATION_KEY: ${{ secrets.ADMIN_REGISTRATION_KEY }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          SERVER_IMAGE: ${{ needs.build.outputs.server_image }}
          CLIENT_IMAGE: ${{ needs.build.outputs.client_image }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET_KEY,ADMIN_REGISTRATION_KEY,IMAGE_TAG,SERVER_IMAGE,CLIENT_IMAGE,GHCR_ACTOR,GHCR_TOKEN
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            git pull origin master

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            printf 'POSTGRES_DB=%s\n'            "$POSTGRES_DB"            >  .env
            printf 'POSTGRES_USER=%s\n'          "$POSTGRES_USER"          >> .env
            printf 'POSTGRES_PASSWORD=%s\n'      "$POSTGRES_PASSWORD"      >> .env
            printf 'JWT_SECRET_KEY=%s\n'         "$JWT_SECRET_KEY"         >> .env
            printf 'ADMIN_REGISTRATION_KEY=%s\n' "$ADMIN_REGISTRATION_KEY" >> .env
            printf 'SERVER_IMAGE=%s:%s\n'        "$SERVER_IMAGE" "$IMAGE_TAG" >> .env
            printf 'CLIENT_IMAGE=%s:%s\n'        "$CLIENT_IMAGE" "$IMAGE_TAG" >> .env

            docker compose up -d --remove-orphans

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for service
        run: |
          set -e
          URL="${{ vars.HEALTHCHECK_URL }}"
          echo "Polling $URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Service is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 12 attempts."
          exit 1

  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest
    needs: healthcheck
    if: failure()

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ADMIN_REGISTRATION_KEY: ${{ secrets.ADMIN_REGISTRATION_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET_KEY,ADMIN_REGISTRATION_KEY
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}

            SERVER_PREFIX=$(echo "ghcr.io/${{ github.repository }}/server" | tr '[:upper:]' '[:lower:]')
            CLIENT_PREFIX=$(echo "ghcr.io/${{ github.repository }}/client" | tr '[:upper:]' '[:lower:]')

            PREV_SERVER_IMAGE=$(docker images "$SERVER_PREFIX" \
              --format '{{.Repository}}:{{.Tag}}' | sed -n '2p')
            PREV_CLIENT_IMAGE=$(docker images "$CLIENT_PREFIX" \
              --format '{{.Repository}}:{{.Tag}}' | sed -n '2p')

            if [ -z "$PREV_SERVER_IMAGE" ] || [ -z "$PREV_CLIENT_IMAGE" ]; then
              echo "No previous image(s) found — cannot rollback."
              echo "  server: ${PREV_SERVER_IMAGE:-missing}"
              echo "  client: ${PREV_CLIENT_IMAGE:-missing}"
              exit 1
            fi

            echo "Rolling back to $PREV_SERVER_IMAGE and $PREV_CLIENT_IMAGE ..."

            printf 'POSTGRES_DB=%s\n'            "$POSTGRES_DB"            >  .env
            printf 'POSTGRES_USER=%s\n'          "$POSTGRES_USER"          >> .env
            printf 'POSTGRES_PASSWORD=%s\n'      "$POSTGRES_PASSWORD"      >> .env
            printf 'JWT_SECRET_KEY=%s\n'         "$JWT_SECRET_KEY"         >> .env
            printf 'ADMIN_REGISTRATION_KEY=%s\n' "$ADMIN_REGISTRATION_KEY" >> .env
            printf 'SERVER_IMAGE=%s\n' "$PREV_SERVER_IMAGE" >> .env
            printf 'CLIENT_IMAGE=%s\n' "$PREV_CLIENT_IMAGE" >> .env

            docker compose up -d --remove-orphans
            echo "Rollback complete."